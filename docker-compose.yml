services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: spegeln
      POSTGRES_USER: spegeln
      POSTGRES_PASSWORD: spegeln
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  web:
    build:
      context: .
      target: dev
    restart: unless-stopped
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://spegeln:spegeln@db:5432/spegeln
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules

volumes:
  postgres-data: